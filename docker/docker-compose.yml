version: '3.9'

services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    ports:
      - "5432:5432"

    volumes:
      - db_data:/var/lib/postgresql/data


  app:
    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: streamlit_app

    ports:
      - "8501:8501"

    depends_on:
      - db

    env_file:
      - .env

    environment:
      DB_HOST: db
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_PORT: ${DB_PORT}

volumes:
  db_data: